    /* Calendar tab */
    function handleCalClick(y, m, d) {
      if (!A.calMode) return;

      var time = A.calTime || '00:00';
      var dateStr = y + '-' + pad(m + 1) + '-' + pad(d);
      var utcPub = localToUTC(dateStr, time);

      if (new Date(utcPub).getTime() < Date.now()) {
        toast('The scheduled time is in the past!', 'err');
        return;
      }

      var drafts = getDrafts().filter(function (v) { return !A.scheduled[v.id] && !A.calScheduled[v.id]; });
      if (A.searchQuery && A.searchQuery.trim() !== '') {
        var q = A.searchQuery.toLowerCase();
        drafts = drafts.filter(function (v) { return getTitle(v).toLowerCase().includes(q); });
      }
      if (drafts.length === 0) { toast('Tidak ada draft tersisa yang cocok dengan filter!', 'inf'); return; }
      var v = drafts[0];

      A.calScheduled[v.id] = utcPub;
      if (!A.calHistory) A.calHistory = [];
      A.calHistory.push(v.id);
      persistDraftState();
      render();
    }

    async function doSaveCalScheduled() {
      var ids = Object.keys(A.calScheduled);
      if (ids.length === 0) return;
      var titleLines = (A.calMeta.titles || '').split('\n').map(function (x) { return x.trim(); }).filter(Boolean);
      var descText  = A.calMeta.desc || '';
      var tagsArr   = (A.calMeta.tags || '').split(',').map(function (x) { return x.trim(); }).filter(Boolean);
      var hasMeta   = !!(A.calMeta.titles || A.calMeta.desc || A.calMeta.tags);
      var btn = $('cal-save-btn'); if (btn) { btn.disabled = true; btn.textContent = 'Menyimpan...'; }

      // Delegate to the resumable queue runner (see helpers above applyBulk()).
      await runCalQueue(ids, 0, 0, hasMeta, titleLines, descText, tagsArr, 0);
    }

    function renderCalendar() {
      var MONTHS = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      var DAYS = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
      var y = A.calY, m = A.calM;

      if (A.calMode === undefined) A.calMode = false;
      if (A.calTime === undefined) A.calTime = '00:00';
      if (!A.calScheduled) A.calScheduled = {};

      var ev = {};
      function addEv(videoId, pubStr, isTemp) {
        var d = new Date(pubStr);
        var k = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
        if (!ev[k]) ev[k] = [];
        var v = A.videos.find(function (x) { return x.id === videoId });
        if (v) ev[k].push({ video: v, temp: isTemp });
      }
      Object.entries(A.scheduled).forEach(function (e) { addEv(e[0], e[1], false); });
      Object.entries(A.calScheduled).forEach(function (e) { addEv(e[0], e[1], true); });

      var td = new Date(), first = new Date(y, m, 1), sd = first.getDay(), dim = new Date(y, m + 1, 0).getDate(), pp = new Date(y, m, 0).getDate();

      var h = '<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;">';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div class="cal-nav">' +
        '<button class="btn btn-sm" onclick="A.calM--;if(A.calM<0){A.calM=11;A.calY--;}render()">← Prev</button>' +
        '<span class="cal-title">' + MONTHS[m] + ' ' + y + '</span>' +
        '<button class="btn btn-sm" onclick="A.calM++;if(A.calM>11){A.calM=0;A.calY++;}render()">Next →</button>' +
        '</div><div class="cal-grid">';
      DAYS.forEach(function (d) { h += '<div class="cal-head">' + d + '</div>'; });

      for (var i = 0; i < 42; i++) {
        var day, off = false, cellY = y, cellM = m;
        if (i < sd) { day = pp - sd + i + 1; off = true; cellM--; if (cellM < 0) { cellM = 11; cellY--; } }
        else if (i >= sd + dim) { day = i - sd - dim + 1; off = true; cellM++; if (cellM > 11) { cellM = 0; cellY++; } }
        else day = i - sd + 1;

        var isT = !off && day === td.getDate() && m === td.getMonth() && y === td.getFullYear();
        var evs = ev[cellY + '-' + cellM + '-' + day] || [];
        h += '<div class="cal-cell' + (off ? ' dim' : '') + (isT ? ' today' : '') + (A.calMode ? '' : '') + '" ' + (A.calMode ? 'onclick="handleCalClick(' + cellY + ',' + cellM + ',' + day + ')" style="cursor:pointer"' : '') + '>';
        h += '<div class="cal-num">' + day + '</div>';
        evs.slice(0, 2).forEach(function (e) {
          var t = getTitle(e.video);
          h += '<div class="cal-ev" title="' + esc(t) + '" style="' + (e.temp ? 'background:var(--orange-bg);color:var(--orange);border-left-color:var(--orange);border-style:dashed;border-width:1px 1px 1px 2px;' : '') + '">' + esc(t.length > 16 ? t.slice(0, 14) + '…' : t) + '</div>';
        });
        if (evs.length > 2) h += '<div class="cal-more">+' + (evs.length - 2) + ' lagi</div>';
        h += '</div>';
      }
      h += '</div></div>';

      h += '<div style="width:280px;flex-shrink:0;">';
      h += '<div class="panel">';
      h += '<div class="panel-head">🖱 Visual Scheduling</div>';
      h += '<div class="panel-body">';

      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
      h += '<label style="font-size:12px;font-weight:700;">Mode Aktif</label>';
      h += '<label style="font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" ' + (A.calMode ? 'checked' : '') + ' onchange="A.calMode=this.checked;render()" style="width:16px;height:16px;accent-color:var(--red);"> Ya</label>';
      h += '</div>';

      h += '<div class="fg"><label>Waktu Default (' + tzLabel() + ')</label><input type="time" value="' + esc(A.calTime) + '" oninput="A.calTime=this.value;persistDraftState();"></div>';

      // ── Bulk Metadata (optional) ──────────────────────────────
      h += '<div class="cal-meta-section">';
      h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:8px">📝 Update Metadata (Opsional)</div>';
      h += '<label class="cml">Judul (1 Baris = 1 Video)</label>';
      h += '<textarea id="cal-titles" rows="3" placeholder="Judul Video 1\\nJudul Video 2" oninput="A.calMeta.titles=this.value;persistDraftState();updateCharCounter(\'cal-titles-cnt\',this.value,100,true);">' + esc(A.calMeta.titles || '') + '</textarea>' + getCounterHtml('cal-titles-cnt', A.calMeta.titles, 100, true);
      h += '<label class="cml">Deskripsi (Untuk Semua Video)</label>';
      h += '<textarea id="cal-desc" rows="2" placeholder="Deskripsi bersama..." oninput="A.calMeta.desc=this.value;persistDraftState();updateCharCounter(\'cal-desc-cnt\',this.value,5000,false);">' + esc(A.calMeta.desc || '') + '</textarea>' + getCounterHtml('cal-desc-cnt', A.calMeta.desc, 5000, false);
      h += '<label class="cml">Tags (Pisahkan koma)</label>';
      h += '<input type="text" id="cal-tags" placeholder="tag1, tag2" value="' + esc(A.calMeta.tags || '') + '" oninput="A.calMeta.tags=this.value;persistDraftState();updateCharCounter(\'cal-tags-cnt\',this.value,500,false);">' + getCounterHtml('cal-tags-cnt', A.calMeta.tags, 500, false);
      h += '</div>';

      var allCalDrafts = getDrafts().filter(function (v) { return !A.scheduled[v.id] && !A.calScheduled[v.id]; });
      var drafts = allCalDrafts;
      if (A.searchQuery) {
        var q = A.searchQuery.toLowerCase();
        drafts = drafts.filter(function (v) { return getTitle(v).toLowerCase().includes(q); });
      }

      h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin:12px 0 8px;">Draft Queue (' + drafts.length + ')</div>';
      h += renderSearchBar();

      if (drafts.length > 0) {
        h += '<div style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding-right:4px;">';
        drafts.slice(0, 20).forEach(function (v, i) {
          var t = getTitle(v);
          h += '<div style="padding:6px 8px;border:1px solid var(--border);border-radius:var(--r3);background:var(--card);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + esc(t) + '">' + (i === 0 && A.calMode ? '<span style="color:var(--red);font-weight:bold;margin-right:4px;">▶ Next:</span>' : '') + esc(t) + '</div>';
        });
        if (drafts.length > 20) h += '<div style="font-size:10px;color:var(--t3);text-align:center;margin-top:4px;">+' + (drafts.length - 20) + ' lainnya</div>';
        h += '</div>';
      } else if (allCalDrafts.length > 0) {
        h += '<div style="font-size:11px;color:var(--t3);padding:8px 0;text-align:center;">Tidak ada video yang cocok</div>';
      } else {
        h += '<div style="font-size:11px;color:var(--t3);">Tidak ada draft.</div>';
      }

      var tempCount = Object.keys(A.calScheduled).length;
      if (tempCount > 0) {
        h += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">';
        h += '<div class="info-orange" style="font-size:11px;margin-bottom:8px;">Ada ' + tempCount + ' video belum disimpan!</div>';
        h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
        h += '<button class="btn btn-sm btn-ghost" onclick="A.calScheduled={};A.calHistory=[];persistDraftState();render()">Reset</button>';
        if (A.calHistory && A.calHistory.length > 0) {
          h += '<button class="btn btn-sm" onclick="undoCal()">Undo (\u21a9)</button>';
        }
        h += '<button class="btn btn-red btn-sm" style="flex:1;" id="cal-save-btn" onclick="prepareCalSave()">\ud83d\udcbe Simpan ke YT</button>';
        h += '</div>';
        h += '</div>';
      }

      h += '</div></div></div>'; // end sidebar & flex wrapper

      return h;
    }

    function renderDashboard() {
      var h = renderChBar() + renderStats();
      h += '<div class="tabs">' +
        '<button class="tab' + (A.tab === 'list' ? ' active' : '') + '" onclick="A.tab=\'list\';A.openPanel=null;render()">📋 Per Video</button>' +
        '<button class="tab' + (A.tab === 'bulk' ? ' active' : '') + '" onclick="A.tab=\'bulk\';A.openPanel=null;render()">🚀 Jadwal Massal</button>' +
        '<button class="tab' + (A.tab === 'cal' ? ' active' : '') + '" onclick="A.tab=\'cal\';render()">📅 Kalender</button>' +
        '</div>';
      if (A.tab === 'list') h += renderPerVideo();
      else if (A.tab === 'bulk') h += renderBulk();
      else h += renderCalendar();
      return h;
    }

    function renderAddChModal() {
      var sw = COLORS.map(function (c) { return '<div class="cswatch' + (A.newCh.color === c ? ' sel' : '') + '" style="background:' + c + '" onclick="A.newCh.color=\'' + c + '\';render()"></div>'; }).join('');
      var cidField = getClientIds().length > 0
        ? '<div class="info-blue" style="font-size:12px;margin-bottom:10px">✓ Menggunakan Client ID dari config file.</div>'
        : '<div class="fg"><label>OAuth Client ID</label><input id="nc-cid" type="text" placeholder="xxxxxxxx.apps.googleusercontent.com" value="' + esc(A.newCh.cid) + '"></div>';
      return '<div class="overlay" onclick="if(event.target===this){A.modal=null;render()}">' +
        '<div class="modal"><h3>➕ Tambah Channel Baru</h3>' +
        '<div class="fg"><label>Nama Channel</label><input id="nc-name" type="text" placeholder="Channel Gaming" value="' + esc(A.newCh.name) + '"></div>' +
        cidField +
        '<div class="fg"><label>Warna Label</label><div class="color-row">' + sw + '</div></div>' +
        '<div class="modal-footer"><button class="btn btn-sm" onclick="A.modal=null;render()">Batal</button>' +
        '<button class="btn btn-red btn-sm" onclick="A.newCh.name=val(\'nc-name\');A.newCh.cid=val(\'nc-cid\')||getClientIds()[0]||\'\';addChannel()">Hubungkan →</button></div>' +
        '</div></div>';
    }

    function renderConfirmSaveModal() {
      var pd = A.previewData;
      if (!pd) return '';
      var rows = pd.rows, hasError = pd.hasError;

      var h = '<div class="overlay" onclick="if(event.target===this){A.modal=null;A.previewData=null;render()}">';
      h += '<div class="modal modal-wide">';
      h += '<h3>\ud83d\ude80 Konfirmasi Jadwal \u2014 ' + rows.length + ' Video</h3>';

      if (hasError) {
        h += '<div style="padding:9px 12px;border-radius:var(--r3);font-size:12px;line-height:1.55;margin-bottom:10px;background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5;flex-shrink:0">';
        h += '\u26a0 Beberapa judul melebihi <b>100 karakter</b>. Perbaiki dahulu sebelum bisa menyimpan.</div>';
      } else {
        h += '<div style="padding:9px 12px;border-radius:var(--r3);font-size:12px;margin-bottom:10px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);flex-shrink:0">';
        h += '\u2713 Semua judul valid. Klik <b>Ya, Simpan</b> untuk mengirim ke YouTube API.</div>';
      }

      if (pd.hasCollision) {
        h += '<div class="info-orange" style="margin-bottom:10px;font-size:12px;line-height:1.5;flex-shrink:0;">\u26a0\ufe0f Peringatan: Ada beberapa video yang dijadwalkan pada waktu yang persis sama. Lanjutkan jika memang disengaja.</div>';
      }

      h += '<div class="modal-scroll">';
      h += '<div style="overflow-x:auto"><table class="ptable" style="min-width:500px;width:100%">';
      h += '<thead><tr>';
      h += '<th class="pnum">#</th>';
      h += '<th style="width:62px">Thumb</th>';
      h += '<th>Judul</th>';
      h += '<th style="white-space:nowrap">Jadwal Publish</th>';
      h += '<th style="width:88px;text-align:center">Karakter</th>';
      h += '</tr></thead><tbody>';

      rows.forEach(function (row, i) {
        h += '<tr class="' + (row.err ? 'row-err' : '') + '">';
        h += '<td class="pnum">' + (i + 1) + '</td>';

        // Thumbnail
        h += '<td style="padding:6px 10px">';
        if (row.thumb) {
          h += '<img src="' + esc(row.thumb.url) + '" style="width:56px;height:32px;object-fit:cover;border-radius:3px;display:block" loading="lazy">';
        } else {
          h += '<div style="width:56px;height:32px;background:var(--hover);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px">\u25b6</div>';
        }
        h += '</td>';

        // Title column
        h += '<td style="max-width:240px">';
        if (row.changed) {
          h += '<span class="old-title" title="' + esc(row.oldTitle) + '">' + esc(row.oldTitle.length > 46 ? row.oldTitle.slice(0,44) + '\u2026' : row.oldTitle) + '</span>';
          h += '<span class="new-title-arrow">\u2193</span>';
          h += '<span class="new-title" title="' + esc(row.newTitle) + '" style="' + (row.err ? 'color:#DC2626' : '') + '">' + esc(row.newTitle.length > 46 ? row.newTitle.slice(0,44) + '\u2026' : row.newTitle) + '</span>';
        } else {
          h += '<span style="font-size:12px;font-weight:500" title="' + esc(row.oldTitle) + '">' + esc(row.oldTitle.length > 55 ? row.oldTitle.slice(0,53) + '\u2026' : row.oldTitle) + '</span>';
        }
        h += '</td>';

        // Date
        h += '<td><span class="badge b-sched" style="font-size:10px;white-space:nowrap">' + esc(row.dateLabel) + '</span></td>';

        // Char count
        h += '<td style="text-align:center">';
        if (row.err) {
          h += '<span class="char-badge char-err-badge">' + row.len + '/100 !</span>';
        } else if (row.changed) {
          h += '<span class="char-badge char-ok">' + row.len + '/100</span>';
        } else {
          h += '<span style="font-size:10px;color:var(--t3)">' + row.len + '/100</span>';
        }
        h += '</td>';
        h += '</tr>';
      });

      h += '</tbody></table></div>';
      h += '</div>'; // end modal-scroll

      h += '<div class="modal-footer" style="flex-shrink:0;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">';
      h += '<button class="btn btn-sm" onclick="A.modal=null;A.previewData=null;render()">\u2190 Batal</button>';
      if (hasError) {
        h += '<button class="btn btn-red btn-sm" disabled title="Perbaiki judul yang melebihi 100 karakter" style="opacity:.45;cursor:not-allowed">\u2713 Ya, Simpan ke YouTube</button>';
      } else {
        h += '<button class="btn btn-red btn-sm" onclick="executeSchedule()">\u2713 Ya, Simpan ke YouTube</button>';
      }
      h += '</div>';
      h += '</div></div>';
      return h;
    }

    function render() {
      var root = $('root'); if (!root) return;
      var focusId = document.activeElement ? document.activeElement.id : null;
      var selStart = null, selEnd = null;
      if (focusId && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) {
        try { selStart = document.activeElement.selectionStart; selEnd = document.activeElement.selectionEnd; } catch (e) {}
      }
      var h = '';
      if (A.step === 'setup') h = renderSetup();
      else if (A.step === 'loading') h = '<div class="loader"><div class="spinner"></div> Memuat video dari YouTube...</div>';
      else if (A.step === 'pick_channel') h = renderPickChannel();
      else if (A.step === 'dashboard') h = renderDashboard();
      if (A.modal === 'addch') h += renderAddChModal();
      if (A.modal === 'cfg') h += renderCfgModal();
      if (A.modal === 'error') h += renderErrorModal();
      if (A.modal === 'confirm_save') h += renderConfirmSaveModal();
      root.innerHTML = h; renderHeader();
      if (focusId) {
        var el = $(focusId);
        if (el && typeof el.focus === 'function') {
          el.focus();
          if (selStart !== null && selEnd !== null && typeof el.setSelectionRange === 'function') {
            try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
          }
        }
      }
    }

    function renderErrorModal() {
      return '<div class="overlay" onclick="if(event.target===this){A.modal=null;A.errorMsg=null;render()}">' +
        '<div class="modal" style="width:480px">' +
        '<h3>❌ Terjadi Kesalahan API</h3>' +
        '<div style="font-size:13px;color:var(--t2);margin-bottom:12px;">Pesan Error dari YouTube:</div>' +
        '<textarea readonly style="width:100%;height:150px;padding:10px;font-family:monospace;font-size:11px;background:var(--hover);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);resize:none;">' + esc(A.errorMsg) + '</textarea>' +
        '<div class="modal-footer">' +
        '<button class="btn btn-red btn-sm" onclick="A.modal=null;A.errorMsg=null;render()">Tutup</button>' +
        '</div>' +
        '</div></div>';
    }

    // Boot — if CONFIG has clientId and channels, skip setup screen
    A.channels = lsCh();
    if (A.channels.length && getClientIds().length) {
      A.step = 'setup'; // show channel selector, not blank setup
    }
    try {
      var savedState = sessionStorage.getItem('yt_draft_state');
      if (savedState) {
        var parsed = JSON.parse(savedState);
        if (parsed.bulk) Object.assign(A.bulk, parsed.bulk);
        if (parsed.calScheduled) A.calScheduled = parsed.calScheduled;
        if (parsed.calHistory) A.calHistory = parsed.calHistory;
        if (parsed.calMeta) Object.assign(A.calMeta, parsed.calMeta);
      }
    } catch (e) {
      console.warn('Failed to restore draft state', e);
    }
    render();
  </script>
</body>

</html>
