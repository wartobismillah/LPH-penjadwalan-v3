════════════════════════════════════════════════════════════════════════════════════════════
   📅 YOUTUBE MULTI-CHANNEL SCHEDULER (VERSI UPGRADE v4 / UPDATED)
════════════════════════════════════════════════════════════════════════════════════════════

⚡ APA YANG BARU / BEDANYA DI VERSI UPGRADE INI?
Berikut adalah rincian 3 Bug Fix dan 3 Fitur Baru (serta 3 perbaikan logika tambahan) yang telah diterapkan tanpa mengubah logika core YouTube API & OAuth:

=== 🛠 PART 1: BUG FIXES & UX IMPROVEMENTS ===
1. Mencegah Grid Kalender Rusak (CSS Grid Blowout Fix):
   - Ditambahkan properti `min-width: 0;` pada kelas `.cal-cell`. Jika judul video sangat panjang di dalam kalender (.cal-ev), teks akan dipotong rapi dengan ellipsis (...) tanpa mendorong kolom hari Sabtu keluar layar.
2. Fitur Pencarian & Filter Real-Time (Search & Filter Bar):
   - Ditambahkan kotak pencarian cepat (dengan tombol hapus '×') pada tab Bulk ("Belum Dijadwalkan") dan tab Kalender ("Draft Queue").
   - Filter bekerja secara dinamis dan real-time, serta menampilkan pesan "Tidak ada video yang cocok" jika hasil pencarian kosong.
   - [Perbaikan v2]: Mengetik di kotak pencarian kini dijamin TIDAK LEPAS fokus (cursor & focus preservation). Anda bisa mengetik mulus tanpa harus klik per huruf.
3. Tombol Undo Penjadwalan Kalender (Calendar Undo):
   - Ditambahkan pelacakan riwayat jadwal (`A.calHistory`) dan tombol "Undo (↩)" di sidebar Kalender. Anda bisa membatalkan tanggal yang baru saja diklik selangkah demi selangkah.
   - [Perbaikan v2]: Klik tanggal pada kalender kini secara ketat HANYA menjadwalkan video yang lolos filter pencarian aktif, dan akan berhenti memberi tahu bila draft terfilter sudah habis.

=== 🚀 PART 2: WORKFLOW ENHANCEMENTS ===
4. Live Character Counter untuk Metadata (Judul, Deskripsi, Tags):
   - Ditambahkan indikator batas karakter [current]/[max] secara live di bawah form metadata.
   - Untuk judul bulk/kalender ("1 Baris = 1 Video"), sistem menghitung berdasarkan BARIS TERPANJANG (bukan total karakter gabungan), sehingga akurat memvalidasi batas 100 karakter YouTube.
   - Angka akan berubah menjadi MERAH TEBAL (#DC2626) apabila melebihi batas ketentuan YouTube.
5. Peringatan Bentrokan Waktu (Non-Blocking Schedule Collision Warning):
   - Sistem otomatis mendeteksi jika ada 2 atau lebih video yang dijadwalkan pada tanggal dan jam yang persis sama.
   - Menampilkan banner peringatan warna oranye di dalam Modal Konfirmasi Simpan, namun tombol "Ya, Simpan" tetap aktif (non-blocking) jika Anda memang sengaja melakukannya.
6. Penyimpanan Draft Otomatis (Anti Data-Loss via sessionStorage):
   - Seluruh pilihan checkbox video, tanggal jadwal, riwayat undo, interval, dan teks metadata otomatis disimpan ke `sessionStorage` (`yt_draft_state`).
   - Jika browser tidak sengaja ter-refresh (F5), seluruh pekerjaan draft Anda langsung dipulihkan 100%. Data draft akan bersih otomatis hanya ketika tab browser ditutup.
   - [Perbaikan v2]: Tombol "Pilih Semua" dan "Batal Semua" di tab Bulk kini secara presisi HANYA memilih/membatalkan video yang sedang terfilter di layar.

════════════════════════════════════════════════════════════════════════════════════════════

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --red: #FF0000;
      --red-d: #CC0000;
      --red-bg: #FFF0F0;
      --red-b: #FFBBBB;
      --bg: #F7F7F7;
      --card: #FFF;
      --hover: #F2F2F2;
      --text: #111;
      --t2: #555;
      --t3: #999;
      --border: #E2E2E2;
      --border2: #C8C8C8;
      --green: #1A7F3C;
      --green-bg: #E8F5ED;
      --green-b: #A3D9B1;
      --orange: #B45309;
      --orange-bg: #FEF3C7;
      --orange-b: #FCD34D;
      --blue: #1A56DB;
      --blue-bg: #EBF5FF;
      --blue-b: #93C5FD;
      --purple: #7C3AED;
      --purple-bg: #F5F3FF;
      --r: 10px;
      --r2: 7px;
      --r3: 5px;
      --sh: 0 1px 3px rgba(0, 0, 0, .08);
      --sh2: 0 4px 20px rgba(0, 0, 0, .13);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }

    @media(prefers-color-scheme:dark) {
      :root {
        --bg: #0F0F0F;
        --card: #1C1C1C;
        --hover: #272727;
        --text: #F1F1F1;
        --t2: #AAA;
        --t3: #666;
        --border: #2E2E2E;
        --border2: #444;
        --green: #4ADE80;
        --green-bg: #052E16;
        --green-b: #166534;
        --orange: #FBBF24;
        --orange-bg: #1C1300;
        --orange-b: #92400E;
        --blue: #60A5FA;
        --blue-bg: #1E3A5F;
        --blue-b: #1D4ED8;
        --purple: #A78BFA;
        --purple-bg: #2E1065;
        --red-bg: #2D0000;
        --red-b: #7F0000;
      }
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1rem 4rem
    }

    /* ─ Header ─ */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .9rem 0;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 30
    }

    .logo-box {
      width: 34px;
      height: 34px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .logo-box svg {
      width: 20px;
      height: 20px;
      fill: #fff
    }

    .logo-text h1 {
      font-size: 16px;
      font-weight: 700
    }

    .logo-text p {
      font-size: 11px;
      color: var(--t3)
    }

    .hdr-r {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px
    }

    /* ─ Buttons ─ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      box-shadow: var(--sh)
    }

    .btn:hover {
      background: var(--hover);
      border-color: var(--border2)
    }

    .btn:active {
      transform: scale(.98)
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none
    }

    .btn-red {
      background: var(--red);
      border-color: var(--red-d);
      color: #fff;
      box-shadow: none
    }

    .btn-red:hover {
      background: var(--red-d)
    }

    .btn-green {
      background: var(--green-bg);
      border-color: var(--green-b);
      color: var(--green)
    }

    .btn-green:hover {
      filter: brightness(.93)
    }

    .btn-sm {
      padding: 5px 11px;
      font-size: 12px
    }

    .btn-xs {
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 600
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      box-shadow: none
    }

    .btn-ghost:hover {
      background: var(--hover);
      border-color: var(--border)
    }

    /* ─ Channel bar ─ */
    .ch-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      box-shadow: var(--sh)
    }

    .ch-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--t3);
      white-space: nowrap
    }

    .ch-chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      flex: 1
    }

    .ch-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--t2);
      transition: all .15s;
      white-space: nowrap
    }

    .ch-chip:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .ch-chip.active {
      background: var(--red);
      border-color: var(--red-d);
      color: #fff
    }

    .ch-del {
      font-size: 15px;
      line-height: 1;
      opacity: .5;
      padding: 0 2px
    }

    .ch-del:hover {
      opacity: 1
    }

    .btn-add-ch {
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 20px;
      border: 1.5px dashed var(--border2);
      cursor: pointer;
      background: transparent;
      color: var(--t3);
      transition: all .15s
    }

    .btn-add-ch:hover {
      border-color: var(--red);
      color: var(--red)
    }

    /* ─ Stats ─ */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 15px;
      box-shadow: var(--sh)
    }

    .stat-n {
      font-size: 26px;
      font-weight: 800;
      line-height: 1
    }

    .stat-l {
      font-size: 10px;
      color: var(--t3);
      margin-top: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    .c-green {
      color: var(--green)
    }

    .c-orange {
      color: var(--orange)
    }

    .c-blue {
      color: var(--blue)
    }

    .c-purple {
      color: var(--purple)
    }

    /* ─ Tabs ─ */
    .tabs {
      display: flex;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border)
    }

    .tab {
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--t3);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none
    }

    .tab:hover {
      color: var(--text)
    }

    .tab.active {
      color: var(--red);
      border-bottom-color: var(--red)
    }

    /* ─ Filters ─ */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap
    }

    .chip {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--t2);
      transition: all .15s;
      font-weight: 500
    }

    .chip:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .chip.active {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red);
      font-weight: 700
    }

    /* ─ Video row (per-video tab) ─ */
    .vlist {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .vrow {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      transition: all .15s
    }

    .vrow:hover {
      border-color: var(--border2);
      box-shadow: var(--sh)
    }

    .vrow.scheduled {
      border-left: 3px solid var(--green)
    }

    .vrow.open {
      border-color: var(--red);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0
    }

    .thumb {
      width: 88px;
      height: 50px;
      object-fit: cover;
      border-radius: 5px;
      display: block;
      background: var(--hover);
      flex-shrink: 0
    }

    .thumb-ph {
      width: 88px;
      height: 50px;
      border-radius: 5px;
      background: var(--hover);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0
    }

    .vtitle {
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text)
    }

    .vmeta {
      font-size: 11px;
      color: var(--t3);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700
    }

    .b-draft {
      background: var(--hover);
      color: var(--t3)
    }

    .b-sched {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-b)
    }

    .b-soon {
      background: var(--orange-bg);
      color: var(--orange);
      border: 1px solid var(--orange-b)
    }

    .vactions {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: flex-end;
      flex-shrink: 0
    }

    .btn-unsched {
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      color: var(--t2);
      background: transparent;
      cursor: pointer;
      transition: all .15s;
      font-weight: 600
    }

    .btn-unsched:hover {
      background: #FEE2E2;
      border-color: #FCA5A5;
      color: #991B1B
    }

    /* Inline panel */
    .ipanel {
      background: var(--red-bg);
      border: 1px solid var(--red-b);
      border-top: none;
      border-bottom-left-radius: var(--r2);
      border-bottom-right-radius: var(--r2);
      padding: 12px 14px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap
    }

    .ipanel label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--t2);
      margin-bottom: 4px
    }

    .ipanel input[type=date],
    .ipanel input[type=time] {
      padding: 7px 10px;
      font-size: 13px;
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      background: var(--card);
      color: var(--text)
    }

    .ipanel input:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255, 0, 0, .1)
    }

    .tz-hint {
      font-size: 10px;
      color: var(--t3);
      margin-top: 3px
    }

    /* ─ BULK SCHEDULER ─ */
    .bulk-wrap {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      align-items: start
    }

    @media(max-width:700px) {
      .bulk-wrap {
        grid-template-columns: 1fr
      }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--sh)
    }

    .panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .panel-body {
      padding: 14px 16px
    }

    /* Mode selector */
    .mode-opts {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px
    }

    .mode-opt {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--r2);
      cursor: pointer;
      transition: all .15s
    }

    .mode-opt:hover {
      border-color: var(--border2)
    }

    .mode-opt.selected {
      border-color: var(--red);
      background: var(--red-bg)
    }

    .mode-opt input[type=radio] {
      margin-top: 2px;
      accent-color: var(--red);
      flex-shrink: 0
    }

    .mode-opt-text strong {
      font-size: 13px;
      display: block
    }

    .mode-opt-text span {
      font-size: 11px;
      color: var(--t3)
    }

    /* Interval controls */
    .interval-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px
    }

    .interval-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--t2);
      transition: all .15s
    }

    .interval-btn:hover {
      border-color: var(--red);
      color: var(--red)
    }

    .interval-btn.sel {
      background: var(--red);
      border-color: var(--red-d);
      color: #fff
    }

    .custom-n {
      width: 60px;
      padding: 6px 8px;
      font-size: 13px;
      border: 1.5px solid var(--border2);
      border-radius: var(--r2);
      text-align: center;
      background: var(--card);
      color: var(--text)
    }

    .custom-n:focus {
      outline: none;
      border-color: var(--red)
    }

    .fg {
      margin-bottom: 10px
    }

    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--t3);
      margin-bottom: 5px
    }

    .fg input,
    .fg select {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      background: var(--card);
      color: var(--text)
    }

    .fg input:focus,
    .fg select:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255, 0, 0, .1)
    }

    .fg-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    /* Video selection list */
    .sel-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 340px;
      overflow-y: auto;
      padding-right: 2px
    }

    .sel-list::-webkit-scrollbar {
      width: 4px
    }

    .sel-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .sel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--r3);
      background: var(--card);
      cursor: pointer;
      transition: all .15s;
      user-select: none
    }

    .sel-row:hover {
      border-color: var(--border2);
      background: var(--hover)
    }

    .sel-row.checked {
      border-color: var(--red);
      background: var(--red-bg)
    }

    .sel-row input[type=checkbox] {
      accent-color: var(--red);
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      cursor: pointer
    }

    .sel-row .sthumb {
      width: 56px;
      height: 32px;
      object-fit: cover;
      border-radius: 3px;
      background: var(--hover);
      flex-shrink: 0
    }

    .sel-row .sthumb-ph {
      width: 56px;
      height: 32px;
      border-radius: 3px;
      background: var(--hover);
      display: flex;
      align-items: center;
      justify-content: center;

      flex-shrink: 0
    }

      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0
    }

      display: flex;
      flex-direction: column;
      gap: 1px;
      flex-shrink: 0
    }

    .reorder button {
      width: 18px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--card);
      cursor: pointer;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t2);
      padding: 0;
      transition: all .15s
    }

    .reorder button:hover {
      background: var(--hover);
      color: var(--text)
    }

    /* Preview table */
    .preview-wrap {
      margin-top: 0
    }

    .preview-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--t3);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .ptable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    .ptable th {
      text-align: left;
      padding: 7px 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--t3);
      border-bottom: 1px solid var(--border)
    }

    .ptable td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle
    }

    .ptable tr:last-child td {
      border-bottom: none
    }

    .ptable tr:hover td {
      background: var(--hover)
    }

    .ptable .pnum {
      width: 24px;
      color: var(--t3);
      font-weight: 700;
      font-size: 11px
    }

    .ptable .ptitle {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px
    }

    .ptable .pdate {
      white-space: nowrap;
      color: var(--green);
      font-weight: 700
    }

    .ptable .pdate-custom input {
      width: 130px;
      padding: 4px 7px;
      font-size: 12px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      background: var(--card);
      color: var(--text)
    }

    .ptable .pdate-custom input:focus {
      outline: none;
      border-color: var(--red)
    }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin: 10px 0
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      transition: width .4s ease
    }

    /* Info boxes */
    .info-box {
      padding: 9px 12px;
      border-radius: var(--r3);
      font-size: 12px;
      line-height: 1.55;
      margin-bottom: 10px
    }

    .info-blue {
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid var(--blue-b)
    }

    .info-orange {
      background: var(--orange-bg);
      color: var(--orange);
      border: 1px solid var(--orange-b)
    }

    .info-green {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-b)
    }

    /* Calendar */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px
    }

    .cal-title {
      font-size: 15px;
      font-weight: 700
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px
    }

    .cal-head {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .cal-cell {
      min-width: 0;
      min-height: 68px;
      padding: 4px 5px;
      border-radius: var(--r2);
      border: 1px solid var(--border);
      background: var(--card)
    }

    .cal-cell.dim {
      background: var(--hover);
      opacity: .4
    }

    .cal-cell.today {
      border-color: var(--red)
    }

    .cal-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--t3);
      margin-bottom: 2px
    }

    .cal-cell.today .cal-num {
      background: var(--red);
      color: #fff;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px
    }

    .cal-ev {
      background: var(--green-bg);
      color: var(--green);
      border-radius: 3px;
      padding: 2px 5px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
      border-left: 2px solid var(--green)
    }

    .cal-more {
      font-size: 10px;
      color: var(--t3);
      margin-top: 2px;
      padding-left: 4px
    }

    /* Setup */
    .setup-wrap {
      max-width: 520px;
      margin: 2rem auto
    }

    .setup-wrap h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px
    }

    .setup-intro {
      font-size: 13px;
      color: var(--t2);
      margin-bottom: 1.5rem;
      line-height: 1.65
    }

    .steps {
      list-style: none;
      margin-bottom: 1.5rem
    }

    .steps li {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--t2)
    }

    .sn {
      min-width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--red-bg);
      color: var(--red);
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px
    }

    .steps a {
      color: var(--blue)
    }

    .steps code {
      background: var(--hover);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(3px)
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.5rem;
      width: 400px;
      max-width: calc(100vw - 2rem);
      box-shadow: var(--sh2)
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 1.25rem
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 1.25rem
    }

    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px
    }

    .cswatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform .1s
    }

    .cswatch:hover {
      transform: scale(1.15)
    }

    .cswatch.sel {
      border-color: var(--text)
    }

    /* Misc */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--t3)
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 3rem;
      color: var(--t2);
      font-size: 13px
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      padding: 10px 16px;
      border-radius: var(--r2);
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--sh2);
      animation: slideUp .25s ease;
      max-width: 300px
    }

    @keyframes slideUp {
      from {
        transform: translateY(10px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .toast.ok {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-b)
    }

    .toast.err {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5
    }

    .toast.inf {
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid var(--blue-b)
    }

    .vscroll {
      max-height: 520px;
      overflow-y: auto;
      padding-right: 2px
    }

    .vscroll::-webkit-scrollbar {
      width: 5px
    }

    .vscroll::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px
    }

    /* ─ Confirm Save Modal ─ */
    .modal-wide {
      width: 700px;
      max-width: calc(100vw - 2rem);
      max-height: 85vh;
      display: flex;
      flex-direction: column
    }

    .modal-wide h3 {
      margin-bottom: .6rem;
      flex-shrink: 0
    }

    .modal-scroll {
      overflow-y: auto;
      flex: 1;
      margin: 0 -1.5rem;
      padding: 0 1.5rem
    }

    .modal-scroll::-webkit-scrollbar { width: 5px }
    .modal-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px }

    .char-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700
    }

    .char-ok {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-b)
    }

    .char-err-badge {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FCA5A5
    }

    .ptable tr.row-err td { background: rgba(220,38,38,.07) }
    .ptable tr.row-err:hover td { background: rgba(220,38,38,.13) }

    .old-title {
      color: var(--t3);
      text-decoration: line-through;
      font-size: 11px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .new-title-arrow {
      color: var(--t3);
      font-size: 10px;
      margin: 1px 0;
      display: block
    }

    .new-title {
      font-weight: 700;
      color: var(--text);
      font-size: 12px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    /* Cal metadata sidebar */
    .cal-meta-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--border2)
    }

    .cal-meta-section .cml {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--t3);
      margin-bottom: 4px
    }

    .cal-meta-section textarea,
    .cal-meta-section input[type=text] {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      background: var(--card);
      color: var(--text);
      resize: vertical;
      margin-bottom: 8px
    }

    .cal-meta-section textarea:focus,
    .cal-meta-section input[type=text]:focus {
      outline: none;
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,0,0,.08)
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="logo-box"><svg viewBox="0 0 90 90">
            <path
              d="M88.3,25.4c-1-3.8-4-6.8-7.8-7.8C73.8,16,45,16,45,16S16.2,16,9.5,17.7c-3.8,1-6.8,4-7.8,7.8C0,32.1,0,46,0,46s0,13.9,1.7,20.6c1,3.8,4,6.8,7.8,7.8C16.2,76,45,76,45,76s28.8,0,35.5-1.7c3.8-1,6.8-4,7.8-7.8C90,59.9,90,46,90,46S90,32.1,88.3,25.4z M36,59V33l24,13L36,59z" />
          </svg></div>
        <div>
          <div style="font-size:16px;font-weight:700">YT Scheduler</div>
          <div style="font-size:11px;color:var(--t3)">Multi-Channel Video Planner</div>
        </div>
      </div>
      <div class="hdr-r" id="hdr-r"></div>
    </div>
    <div id="root"></div>
  </div>
  <div id="toasts"></div>

  <script>
    // Helper: ambil semua client ID yang valid
    function getClientIds() {
      var ids = (CONFIG.clientIds || []).filter(function (x) { return x && x.trim() });
      if (!ids.length && CONFIG.clientId) ids = [CONFIG.clientId];
      return ids;
    }

    var A = {
      step: 'setup', channels: lsCh(), active: null, token: '',
      cidIdx: 0,          // index ke getClientIds() yang sedang dipakai
      tokenExpiry: 0,     // timestamp ms kapan token expired
      pendingTask: null,  // { type:'bulk'|'cal', remaining, ok, fail, titleLines, descText, tagsArr, startIndex, hasMeta } — snapshot antrean yang terhenti karena 403_QUOTA
      videos: [], scheduled: {},
      calScheduled: {}, calHistory: [], searchQuery: '',
      filter: 'all', tab: 'list',
      openPanel: null,
      modal: null,
      newCh: { name: '', cid: '', color: '#FF0000' },
      calM: new Date().getMonth(), calY: new Date().getFullYear(),
      ytChannels: [], ytSelectedChannel: null,
      hidden: {},  // videoId -> true (disembunyikan dari daftar)
      showHidden: false,
      calMeta: { titles: '', desc: '', tags: '' },
      previewData: null,
      bulk: {
        subTab: 'unsched',  // 'unsched' | 'sched'
        mode: 'interval',
        interval: 1,
        customN: 3,
        startDate: '',
        time: '00:00',
        selected: [],
        customDates: {},
        titles: '',
        desc: '',
        tags: ''
      }
    };
    var COLORS = ['#FF0000', '#1A7F3C', '#1A56DB', '#9333EA', '#EA580C', '#0891B2', '#BE185D', '#CA8A04'];

    function lsCh() {
      var stored = []; try { stored = JSON.parse(localStorage.getItem('yt_ch') || '[]') } catch (e) { }
      var ids = getClientIds();
      var cid0 = ids[0] || '';
      if (cid0 && CONFIG.channels && CONFIG.channels.length) {
        CONFIG.channels.forEach(function (c) {
          var exists = stored.find(function (s) { return s.name === c.name });
          if (!exists) stored.unshift({ id: 'cfg_' + c.name.replace(/\s/g, '_'), name: c.name, cid: cid0, color: c.color || '#FF0000', fromConfig: true });
          else if (!exists.cid) exists.cid = cid0;
        });
      }
      if (cid0) stored.forEach(function (c) { if (!c.cid) c.cid = cid0; });
      return stored;
    }
    function saveCh() {
      var toSave = A.channels.filter(function (c) { return !c.fromConfig });
      localStorage.setItem('yt_ch', JSON.stringify(toSave));
    }
    function saveSched() { if (!A.active) return; localStorage.setItem('yt_sc_' + A.active.id, JSON.stringify(A.scheduled)) }
    function saveHidden() { if (!A.active) return; localStorage.setItem('yt_hid_' + A.active.id, JSON.stringify(A.hidden)) }
    function loadHidden(ch) { try { return JSON.parse(localStorage.getItem('yt_hid_' + ch.id) || '{}') } catch (e) { return {} } }
    function loadSched(ch) { try { return JSON.parse(localStorage.getItem('yt_sc_' + ch.id) || '{}') } catch (e) { return {} } }
    function persistDraftState() {
      try {
        var state = {
          bulk: A.bulk,
          calScheduled: A.calScheduled,
          calHistory: A.calHistory || [],
          calMeta: A.calMeta
        };
        sessionStorage.setItem('yt_draft_state', JSON.stringify(state));
      } catch (e) {
        console.warn('Failed to persist draft state', e);
      }
    }
    function renderSearchBar() {
      var val = esc(A.searchQuery || '');
      var h = '<div style="position:relative;margin-bottom:10px;display:flex;align-items:center;">';
      h += '<input type="text" id="search-bar-input" placeholder="🔍 Cari judul video..." value="' + val + '" oninput="A.searchQuery=this.value;render()" style="width:100%;padding:6px 26px 6px 10px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--card);color:var(--text);">';
      if (A.searchQuery) {
        h += '<button onclick="A.searchQuery=\'\';render()" style="position:absolute;right:6px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0 6px;line-height:1;" title="Hapus pencarian">×</button>';
      }
      h += '</div>';
      return h;
    }
    function getCounterHtml(cntId, val, maxLen, isMultiLine) {
      var len = 0;
      if (isMultiLine && val) {
        var lines = val.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var l = lines[i].trim().length;
          if (l > len) len = l;
        }
      } else {
        len = val ? val.length : 0;
      }
      var color = len > maxLen ? '#DC2626' : 'var(--t3)';
      var weight = len > maxLen ? 'font-weight:700;' : '';
      return '<div id="' + cntId + '" style="font-size:11px;color:' + color + ';' + weight + 'text-align:right;margin-top:3px;">' + len + '/' + maxLen + '</div>';
    }
    function updateCharCounter(elemId, val, maxLen, isMultiLine) {
      var el = $(elemId);
      if (!el) return;
      var len = 0;
      if (isMultiLine && val) {
        var lines = val.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var l = lines[i].trim().length;
          if (l > len) len = l;
        }
      } else {
        len = val ? val.length : 0;
      }
      el.textContent = len + '/' + maxLen;
      el.style.color = len > maxLen ? '#DC2626' : 'var(--t3)';
      el.style.fontWeight = len > maxLen ? '700' : '400';
    }
    function undoCal() {
      if (!A.calHistory || !A.calHistory.length) return;
      var videoId = A.calHistory.pop();
      if (videoId) {
        delete A.calScheduled[videoId];
        toast('Jadwal dibatalkan', 'inf');
        persistDraftState();
        render();
      }
    }
    function tzOffset() { return -new Date().getTimezoneOffset() / 60 }
    function tzLabel() {
      var o = tzOffset();
      // Named timezone labels
      var names = { 7: 'WIB', 8: 'WITA', 9: 'WIT' };
      return names[o] || (o >= 0 ? 'UTC+' + o : 'UTC' + o);
    }
    // FIXED: new Date('YYYY-MM-DDTHH:MM:SS') tanpa timezone suffix
    // sudah diinterpretasi browser sebagai LOCAL time,
    // jadi .toISOString() langsung menghasilkan UTC yang benar.
    function localToUTC(date, time) {
      var dp = date.split('-');
      var tp = (time || '00:00').split(':');
      var d = new Date(parseInt(dp[0], 10), parseInt(dp[1], 10) - 1, parseInt(dp[2], 10), parseInt(tp[0], 10), parseInt(tp[1], 10), 0);
      var minTime = Date.now() + (20 * 60 * 1000); // 20-min global buffer
      if (d.getTime() < minTime) d = new Date(minTime);
      // YouTube API requires UTC format: YYYY-MM-DDThh:mm:ss.sssZ
      return d.toISOString();
    }
    function utcToLocal(iso) {
      if (!iso) return { date: '', time: '' };
      var d = new Date(iso);
      return { date: d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()), time: pad(d.getHours()) + ':' + pad(d.getMinutes()) };
    }
    function pad(n) { return String(n).padStart(2, '0') }
    function addDays(dateStr, days) { var d = new Date(dateStr + 'T12:00:00'); d.setDate(d.getDate() + days); return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) }
    function fmtDate(iso) { if (!iso) return ''; return new Date(iso).toLocaleString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) }
    function fmtShort(dateStr) { if (!dateStr) return '-'; var d = new Date(dateStr + 'T12:00:00'); return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) }
    function isSoon(iso) { if (!iso) return false; var d = new Date(iso) - Date.now(); return d > 0 && d < 7 * 864e5 }
    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }
    function $(id) { return document.getElementById(id) }
    function val(id) { return ($(id) || {}).value || '' }
    function today() { return new Date().toISOString().split('T')[0] }
    function tomorrow() { var d = new Date(); d.setDate(d.getDate() + 1); return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }

    function toast(msg, type) {
      var el = document.createElement('div'); el.className = 'toast ' + (type || 'inf'); el.textContent = msg;
      $('toasts').appendChild(el);
      setTimeout(function () { el.style.transition = 'all .3s'; el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; setTimeout(function () { el.remove() }, 320) }, 3200);
    }

    function showErrorModal(msg) {
      A.errorMsg = msg;
      A.modal = 'error';
      render();
    }

    /* ─ GIS / API ─ */
    function loadGIS() {
      return new Promise(function (res, rej) {
        if (window.google && window.google.accounts) { res(); return; }
        var s = document.createElement('script'); s.src = 'https://accounts.google.com/gsi/client'; s.async = true;
        s.onload = res; s.onerror = function () { rej(new Error('Gagal load Google')) };
        document.head.appendChild(s);
      });
    }
    async function signIn(ch, cidIdxOverride) {
      try {
        await loadGIS();
        var ids = getClientIds();
        var cid;
        // FIX: cidIdxOverride must win over ch.cid. Previously `if (!cid)` only
        // consulted cidIdxOverride when ch.cid was empty — but ch.cid is almost
        // always already populated from localStorage, so rotateClientId()'s
        // override was silently ignored and the CID never actually switched.
        if (cidIdxOverride !== undefined) {
          A.cidIdx = cidIdxOverride;
          cid = ids[A.cidIdx % Math.max(ids.length, 1)] || '';
          ch.cid = cid;          // persist the new CID onto the channel object
          saveCh();              // persist to localStorage (no-op for fromConfig channels)
        } else {
          cid = ch.cid || ids[A.cidIdx % Math.max(ids.length, 1)] || '';
        }
        if (!cid) { toast('Client ID belum diisi di CONFIG', 'err'); return; }
        google.accounts.oauth2.initTokenClient({
          client_id: cid,
          scope: 'https://www.googleapis.com/auth/youtube',
          callback: async function (r) {
            if (r.error) {
              // Try next clientId if available
              var nextIdx = (A.cidIdx + 1);
              if (ids.length > 1 && nextIdx < ids.length) {
                toast('Client ID #' + (A.cidIdx + 1) + ' gagal, coba #' + (nextIdx + 1) + '...', 'inf');
                A.cidIdx = nextIdx;
                setTimeout(function () { signIn(ch, nextIdx) }, 500);
              } else {
                toast('Login gagal: ' + r.error, 'err');
              }
              return;
            }
            A.token = r.access_token;
            A.tokenExpiry = Date.now() + (r.expires_in || 3600) * 1000;

            // Auto-resume: if this sign-in happened because a 403_QUOTA pause
            // auto-rotated the CID mid-task, don't re-run pickChannel/fetchVideos
            // (that would burn more quota) — just plug the fresh token into the
            // paused queue and continue exactly where it left off.
            if (A.pendingTask) {
              A.active = ch;
              toast('Melanjutkan sisa antrean...', 'inf');
              render();
              await resumePendingTask();
              return;
            }

            A.active = ch; A.scheduled = loadSched(ch); A.hidden = loadHidden(ch);
            A.step = 'loading'; render(); await pickChannel();
          }
        }).requestAccessToken({ prompt: 'select_account' });
      } catch (e) { toast('Error: ' + e.message, 'err'); }
    }
    // Try next client ID manually (also invoked automatically on 403_QUOTA pause)
    function rotateClientId() {
      var ids = getClientIds();
      if (ids.length <= 1) { toast('Hanya ada 1 Client ID di config', 'inf'); return; }
      A.cidIdx = (A.cidIdx + 1) % ids.length;
      toast('Beralih ke Client ID #' + (A.cidIdx + 1), 'inf');
      if (A.active) signIn(A.active, A.cidIdx);
    }

    async function fetchVideos() {
      try {
        // ── Draft window cut-off ───────────────────────────────────
        // Only fetch videos published/uploaded within draftWindowDays.
        // Results come back newest-first (order=date), so we stop as
        // soon as we hit a video older than the window — no need to
        // page through the entire channel history.
        var windowDays = (CONFIG.draftWindowDays || 90);
        var cutoff = new Date(Date.now() - windowDays * 86400000); // ms

        // ── Langkah 1: Ambil video terbaru, berhenti saat melewati window ──
        var allSearchItems = [];
        var pageToken = '';
        var reachedOld = false;
        do {
          var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&forMine=true&type=video&maxResults=50&order=date';
          if (pageToken) url += '&pageToken=' + encodeURIComponent(pageToken);
          var r1 = await fetch(url, { headers: { Authorization: 'Bearer ' + A.token } });
          var d1 = await r1.json();
          if (d1.error) throw new Error(d1.error.message);
          var pageItems = d1.items || [];
          for (var pi = 0; pi < pageItems.length; pi++) {
            var publishedAt = pageItems[pi].snippet && pageItems[pi].snippet.publishedAt;
            if (publishedAt && new Date(publishedAt) < cutoff) {
              reachedOld = true;
              break; // all remaining items are even older
            }
            allSearchItems.push(pageItems[pi]);
          }
          pageToken = reachedOld ? '' : (d1.nextPageToken || '');
        } while (pageToken);

        if (!allSearchItems.length) { A.videos = []; A.step = 'dashboard'; render(); return; }

        // ── Langkah 2: Fetch detail video dalam batch 50 ───────────
        var allVideos = [];
        for (var b = 0; b < allSearchItems.length; b += 50) {
          var batch = allSearchItems.slice(b, b + 50);
          var ids = batch.map(function (i) { return i.id.videoId }).filter(Boolean).join(',');
          if (!ids) continue;
          var r2 = await fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet,status,contentDetails&id=' + ids,
            { headers: { Authorization: 'Bearer ' + A.token } });
          var d2 = await r2.json();
          if (d2.error) throw new Error(d2.error.message);
          allVideos = allVideos.concat(d2.items || []);
        }

        A.videos = allVideos;
        // ── Langkah 3: Baca jadwal yang sudah ada di YouTube ───────
        A.videos.forEach(function (v) { if (v.status && v.status.publishAt) A.scheduled[v.id] = v.status.publishAt; });
        saveSched(); A.step = 'dashboard'; render();
      } catch (e) {
        var msg = e.message || '';
        if (msg.includes('403')) msg = 'Akses ditolak — pastikan YouTube Data API v3 aktif di Google Cloud';
        else if (msg.includes('401')) msg = 'Token tidak valid — coba Sign In ulang';
        else if (msg.includes('quota')) msg = 'Quota API habis — coba lagi besok atau ganti Client ID';
        toast('Gagal memuat: ' + msg, 'err');
        A.step = 'pick_channel'; render();
      }
    }
    async function apiSet(videoId, publishAt, metadata, categoryId) {
      // STEP 1: Always set the schedule using status-only request (exactly like the old working code).
      // Sending snippet+status together causes YouTube to run full snippet validation,
      // which can incorrectly reject the publishAt even when the timestamp is valid.
      console.log('[apiSet] publishAt sent:', publishAt);
      var statusBody = { id: videoId, status: { privacyStatus: 'private', publishAt: publishAt } };
      var r1 = await fetch('https://www.googleapis.com/youtube/v3/videos?part=status', {
        method: 'PUT', headers: { Authorization: 'Bearer ' + A.token, 'Content-Type': 'application/json' },
        body: JSON.stringify(statusBody)
      });
      var d1 = await r1.json();
      if (d1.error) {
        console.error('YouTube API Error (status):', d1.error);
        if (d1.error.code === 403 || (d1.error.message && d1.error.message.toLowerCase().includes('quota'))) {
          throw new Error('403_QUOTA');
        }
        if (d1.error.errors && d1.error.errors[0] && d1.error.errors[0].reason === 'invalidPublishAt') {
          throw new Error('invalidPublishAt: Timestamp yang dikirim: ' + publishAt + '\n\nKemungkinan penyebab:\n1. Video berstatus Publik (tidak bisa dijadwal ulang).\n2. Video sudah memiliki jadwal yang sama.\n3. Jam komputer tidak sinkron dengan internet.');
        }
        throw new Error(JSON.stringify(d1.error, null, 2));
      }

      // STEP 2: If metadata provided, update snippet in a separate request.
      if (metadata && (metadata.title || metadata.description || (metadata.tags && metadata.tags.length))) {
        var snippetBody = {
          id: videoId,
          snippet: {
            categoryId: categoryId || '22',
            title: metadata.title || '',
            description: metadata.description || '',
            tags: metadata.tags || []
          }
        };
        var r2 = await fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet', {
          method: 'PUT', headers: { Authorization: 'Bearer ' + A.token, 'Content-Type': 'application/json' },
          body: JSON.stringify(snippetBody)
        });
        var d2 = await r2.json();
        if (d2.error) {
          console.error('YouTube API Error (snippet):', d2.error);
          if (d2.error.code === 403 || (d2.error.message && d2.error.message.toLowerCase().includes('quota'))) {
            throw new Error('403_QUOTA');
          }
          throw new Error(JSON.stringify(d2.error, null, 2));
        }
      }
    }
    async function apiUnset(videoId) {
      var r = await fetch('https://www.googleapis.com/youtube/v3/videos?part=status', {
        method: 'PUT', headers: { Authorization: 'Bearer ' + A.token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: videoId, status: { privacyStatus: 'private' } })
      });
      var d = await r.json(); if (d.error) throw new Error(d.error.message);
    }

    /* ─ Bulk actions ─ */
    function getBulkPreview() {
      var b = A.bulk, sel = b.selected, time = val('b-time') || b.time;
      var result = [];
      if (b.mode === 'interval') {
        var start = val('b-start') || b.startDate;
        if (!start || !sel.length) return [];
        for (var i = 0; i < sel.length; i++) {
          var dateStr = addDays(start, i * b.interval);
          result.push({ id: sel[i], date: dateStr, time: time, publishAt: localToUTC(dateStr, time) });
        }
      } else {
        for (var i = 0; i < sel.length; i++) {
          var id = sel[i];
          var dateStr = val('bc-' + id) || b.customDates[id] || '';
          if (dateStr) result.push({ id: id, date: dateStr, time: time, publishAt: localToUTC(dateStr, time) });
        }
      }
      return result;
    }

    /* ─ Pause & Auto-Resume queue runners (shared by Bulk and Calendar saves) ─
       Both loops are refactored into resumable "queue runner" functions so that
       a 403_QUOTA mid-loop can snapshot exactly what's left, pause, auto-rotate
       the Client ID, and pick the same loop back up with the new token — instead
       of dropping the rest of the batch on the user via alert()+break. */

    async function runBulkQueue(items, startOk, startFail, titleLines, descText, tagsArr, offset) {
      offset = offset || 0;
      var btn = $('bulk-apply');
      var ok = startOk, fail = startFail;
      var total = startOk + startFail + items.length;

      for (var localI = 0; localI < items.length; localI++) {
        var i = offset + localI; // absolute index into the ORIGINAL preview, for titleLines alignment
        var vid = items[localI].id;
        var pub = items[localI].publishAt;
        var vObj = A.videos.find(function (x) { return x.id === vid; });
        var newTitle = titleLines[i] || getTitle(vObj);
        var metadata = {};
        var hasMeta = false;

        if (A.bulk.titles || A.bulk.desc || A.bulk.tags) {
          metadata.title = newTitle;
          metadata.description = A.bulk.desc ? descText : ((vObj.snippet && vObj.snippet.description) || '');
          metadata.tags = A.bulk.tags ? tagsArr : ((vObj.snippet && vObj.snippet.tags) || []);
          hasMeta = true;
        }
        var origCatId = (vObj.snippet && vObj.snippet.categoryId) ? vObj.snippet.categoryId : '22';

        try {
          await apiSet(vid, pub, hasMeta ? metadata : null, origCatId);
          A.scheduled[vid] = pub;
          ok++;
          if (btn) btn.textContent = 'Menyimpan ' + ok + '/' + total + '...';
          var sIdx = A.bulk.selected.indexOf(vid);
          if (sIdx > -1) A.bulk.selected.splice(sIdx, 1);
        } catch (e) {
          if (e.message === '403_QUOTA' || (e.message && e.message.toLowerCase().includes('quota'))) {
            // PAUSE: persist progress made so far, stash the remaining queue,
            // then auto-trigger a CID rotation + re-login instead of alert()+break.
            saveSched();
            A.pendingTask = {
              type: 'bulk',
              remaining: items.slice(localI), // includes the item that just failed, so it gets retried
              titleLines: titleLines, descText: descText, tagsArr: tagsArr,
              ok: ok, fail: fail, startIndex: i
            };
            toast('Quota API habis. Mengganti Client ID otomatis & melanjutkan...', 'inf');
            if (btn) { btn.textContent = 'Menunggu Client ID baru...'; }
            rotateClientId();
            return; // pause here — resumePendingTask() will pick the loop back up
          }
          showErrorModal(e.message);
          fail++;
        }
      }

      // Reached only on a genuine finish (first pass with no interruption, or a
      // resumed tail that completed without hitting quota again).
      saveSched();
      persistDraftState();
      if (fail === 0) toast('✓ ' + ok + ' video berhasil dijadwalkan!', 'ok');
      else toast(ok + ' berhasil, ' + fail + ' gagal', 'inf');
      if (btn) { btn.disabled = false; btn.textContent = 'Terapkan Jadwal'; }
      render();
    }

    async function runCalQueue(ids, startOk, startFail, hasMeta, titleLines, descText, tagsArr, offset) {
      offset = offset || 0;
      var btn = $('cal-save-btn');
      var ok = startOk, fail = startFail;
      var total = startOk + startFail + ids.length;

      for (var localI = 0; localI < ids.length; localI++) {
        var i = offset + localI;
        var vid = ids[localI];
        var pub = A.calScheduled[vid];
        var vObj = A.videos.find(function (x) { return x.id === vid; });
        var newTitle = (hasMeta && titleLines[i]) ? titleLines[i] : getTitle(vObj);
        var metadata;
        if (hasMeta) {
          metadata = {
            title: newTitle,
            description: descText || ((vObj && vObj.snippet && vObj.snippet.description) || ''),
            tags: tagsArr.length ? tagsArr : ((vObj && vObj.snippet && vObj.snippet.tags) || [])
          };
        } else {
          metadata = {
            title: getTitle(vObj),
            description: (vObj && vObj.snippet && vObj.snippet.description) || '',
            tags: (vObj && vObj.snippet && vObj.snippet.tags) || []
          };
        }
        var origCatId = (vObj && vObj.snippet && vObj.snippet.categoryId) ? vObj.snippet.categoryId : '22';

        try {
          await apiSet(vid, pub, metadata, origCatId);
          A.scheduled[vid] = pub;
          ok++;
          if (btn) btn.textContent = 'Menyimpan ' + ok + '/' + total + '...';
        } catch (e) {
          if (e.message === '403_QUOTA' || (e.message && e.message.toLowerCase().includes('quota'))) {
            saveSched();
            A.pendingTask = {
              type: 'cal',
              remaining: ids.slice(localI),
              hasMeta: hasMeta, titleLines: titleLines, descText: descText, tagsArr: tagsArr,
              ok: ok, fail: fail, startIndex: i
            };
            toast('Quota API habis. Mengganti Client ID otomatis & melanjutkan...', 'inf');
            if (btn) { btn.textContent = 'Menunggu Client ID baru...'; }
            rotateClientId();
            return;
          }
          showErrorModal(e.message);
          fail++;
        }
      }

      saveSched();
      A.calScheduled = {};
      A.calHistory = [];
      A.calMeta = { titles: '', desc: '', tags: '' };
      persistDraftState();
      if (fail === 0) toast('✓ ' + ok + ' jadwal disimpan!', 'ok');
      else toast(ok + ' berhasil, ' + fail + ' gagal', 'inf');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Simpan ke YT'; }
      render();
    }

    // Called from signIn()'s callback once a fresh token is acquired and
    // A.pendingTask is present. Consumes the snapshot and re-enters whichever
    // queue runner was interrupted, at the exact index it stopped at.
    async function resumePendingTask() {
      if (!A.pendingTask) return;
      var task = A.pendingTask;
      A.pendingTask = null; // clear immediately so this can't double-fire
      if (task.type === 'bulk') {
        await runBulkQueue(task.remaining, task.ok, task.fail, task.titleLines, task.descText, task.tagsArr, task.startIndex);
      } else if (task.type === 'cal') {
        await runCalQueue(task.remaining, task.ok, task.fail, task.hasMeta, task.titleLines, task.descText, task.tagsArr, task.startIndex);
      }
    }

    async function applyBulk() {
      // read current form values
      A.bulk.time = val('b-time') || A.bulk.time;
      if (A.bulk.mode === 'interval') A.bulk.startDate = val('b-start') || A.bulk.startDate;
      if (A.bulk.mode === 'custom') {
        A.bulk.selected.forEach(function (id) {
          var v = val('bc-' + id); if (v) A.bulk.customDates[id] = v;
        });
      }

      A.bulk.titles = val('b-titles');
      A.bulk.desc = val('b-desc');
      A.bulk.tags = val('b-tags');

      var preview = getBulkPreview();
      if (!preview.length) { toast('Tidak ada jadwal untuk diterapkan', 'err'); return; }
      var btn = $('bulk-apply'); if (btn) { btn.disabled = true; btn.textContent = 'Menyimpan...'; }

      var titleLines = (A.bulk.titles || '').split('\n').map(function (x) { return x.trim() }).filter(Boolean);
      var descText = A.bulk.desc || '';
      var tagsArr = (A.bulk.tags || '').split(',').map(function (x) { return x.trim() }).filter(Boolean);

      // Delegate to the resumable queue runner (see helpers above).
      await runBulkQueue(preview, 0, 0, titleLines, descText, tagsArr, 0);
    }

    /* ─ Unified staging & execution for both Bulk and Calendar saves ─ */
    function prepareSavePreview(source) {
      // Step 1: Sync current form values into state
      if (source === 'bulk') {
        A.bulk.time = val('b-time') || A.bulk.time;
        if (A.bulk.mode === 'interval') A.bulk.startDate = val('b-start') || A.bulk.startDate;
        if (A.bulk.mode === 'custom') {
          A.bulk.selected.forEach(function (id) { var v = val('bc-' + id); if (v) A.bulk.customDates[id] = v; });
        }
        A.bulk.titles = val('b-titles');
        A.bulk.desc   = val('b-desc');
        A.bulk.tags   = val('b-tags');
      } else {
        A.calMeta.titles = val('cal-titles');
        A.calMeta.desc   = val('cal-desc');
        A.calMeta.tags   = val('cal-tags');
      }

      // Step 2: Build preview rows
      var previewItems = [], hasError = false;

      if (source === 'bulk') {
        var bPreview = getBulkPreview();
        if (!bPreview.length) { toast('Tidak ada jadwal untuk diterapkan', 'err'); return; }
        var bTitleLines = (A.bulk.titles || '').split('\n').map(function (x) { return x.trim(); }).filter(Boolean);
        for (var bi = 0; bi < bPreview.length; bi++) {
          var bItem = bPreview[bi];
          var bVObj = A.videos.find(function (x) { return x.id === bItem.id; });
          var bOldTitle = getTitle(bVObj);
          var bNewTitle = bTitleLines[bi] || bOldTitle;
          var bLen = bNewTitle.length;
          var bErr = bLen > 100;
          if (bErr) hasError = true;
          previewItems.push({
            id: bItem.id, publishAt: bItem.publishAt, dateLabel: fmtDate(bItem.publishAt),
            thumb: getThumb(bVObj), oldTitle: bOldTitle, newTitle: bNewTitle,
            changed: bNewTitle !== bOldTitle, len: bLen, err: bErr
          });
        }
      } else {
        var calIds = Object.keys(A.calScheduled);
        if (!calIds.length) { toast('Tidak ada jadwal untuk disimpan', 'err'); return; }
        var cTitleLines = (A.calMeta.titles || '').split('\n').map(function (x) { return x.trim(); }).filter(Boolean);
        for (var ci = 0; ci < calIds.length; ci++) {
          var cVid = calIds[ci];
          var cPub = A.calScheduled[cVid];
          var cVObj = A.videos.find(function (x) { return x.id === cVid; });
          var cOldTitle = getTitle(cVObj);
          var cNewTitle = cTitleLines[ci] || cOldTitle;
          var cLen = cNewTitle.length;
          var cErr = cLen > 100;
          if (cErr) hasError = true;
          previewItems.push({
            id: cVid, publishAt: cPub, dateLabel: fmtDate(cPub),
            thumb: getThumb(cVObj), oldTitle: cOldTitle, newTitle: cNewTitle,
            changed: cNewTitle !== cOldTitle, len: cLen, err: cErr
          });
        }
      }

      // Step 3: Show confirmation modal
      var pubSet = new Set(), hasCollision = false;
      for (var pi = 0; pi < previewItems.length; pi++) {
        var pt = previewItems[pi].publishAt;
        if (pubSet.has(pt)) { hasCollision = true; break; }
        pubSet.add(pt);
      }
      A.previewData = { source: source, rows: previewItems, hasError: hasError, hasCollision: hasCollision };
      A.modal = 'confirm_save';
      render();
    }

    function getDrafts() {
      // Only count TRUE drafts:
      //   1. Must be private (not unlisted — unlisted = already published/shared).
      //   2. Must have been uploaded within draftWindowDays (default 90 days).
      //      This prevents years-old private/archived videos from polluting the list.
      var windowDays = (CONFIG.draftWindowDays || 90);
      var cutoff = new Date(Date.now() - windowDays * 86400000);
      return A.videos.filter(function (v) {
        var s = v.status || {};
        if (A.hidden[v.id]) return false;
        // Only private videos qualify as drafts
        if (s.privacyStatus !== 'private') return false;
        // Must be within the draft window
        var pub = v.snippet && v.snippet.publishedAt;
        if (pub && new Date(pub) < cutoff) return false;
        return true;
      });

    async function ghFetchFile() {
      var token = ghGet('token'), repo = ghGet('repo');
      if (!token || !repo) throw new Error('GitHub token / repo belum diset');
      var r = await fetch('https://api.github.com/repos/' + repo + '/contents/index.html', {
        headers: { Authorization: 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!r.ok) throw new Error('GitHub API error ' + r.status + ': pastikan token & repo benar');
      return r.json();
    }

    async function saveConfigToGitHub() {
      var clientId = val('cfg-cid').trim();
      if (!clientId) { toast('Masukkan Client ID', 'err'); return; }

      // Collect channels from dynamic inputs
      var chInputs = document.querySelectorAll('.ch-cfg-row');
      var channels = [];
      chInputs.forEach(function (row) {
        var n = row.querySelector('.ch-cfg-name'), c = row.querySelector('.ch-cfg-color');
        if (n && n.value.trim()) channels.push({ name: n.value.trim(), color: c ? c.value : '#FF0000' });
      });
      if (!channels.length) { toast('Tambahkan minimal 1 channel', 'err'); return; }

      var token = val('cfg-token').trim(), repo = val('cfg-repo').trim();
      if (!token || !repo) { toast('Isi GitHub Token dan Repo', 'err'); return; }
      ghSet('token', token); ghSet('repo', repo);

      var btn = $('btn-save-cfg');
      btn.disabled = true; btn.textContent = 'Menyimpan ke GitHub...';

      try {
        var fileData = await ghFetchFile();
        var current = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
        var sha = fileData.sha;

        // Build new CONFIG block
        var chLines = channels.map(function (c) {
          return "    { name: '" + c.name.replace(/'/g, "\\'") + "', color: '" + c.color + "' }";
        }).join(',\n');
        var allCids = getClientIds();
        if (clientId && !allCids.includes(clientId)) allCids.unshift(clientId);
        if (!allCids.length) allCids = [''];
        var cidLines = allCids.concat(['', '']).slice(0, 3).map(function (c, i) {
          return "    '" + c + "',   // Client ID #" + (i + 1) + (i === 0 ? ' (utama)' : ' (cadangan)');
        }).join('\n');
        var newConfig = "var CONFIG = {\n  clientIds: [\n" + cidLines + "\n  ],\n\n  channels: [\n" + chLines + "\n  ]\n};";

        var newContent = current.replace(/var CONFIG = \{[\s\S]*?\};/, newConfig);
        if (newContent === current) throw new Error('Tidak bisa menemukan blok CONFIG di file. Pastikan filenya tidak diubah manual.');

        var r = await fetch('https://api.github.com/repos/' + repo + '/contents/index.html', {
          method: 'PUT',
          headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
          body: JSON.stringify({ message: 'Update YT Scheduler config via app', content: toB64(newContent), sha: sha })
        });
        var rd = await r.json();
        if (!r.ok) throw new Error(rd.message || 'GitHub error ' + r.status);

        toast('✓ Berhasil disimpan ke GitHub!', 'ok');
        A.modal = null;
        // Reload after short delay so GitHub Pages can deploy
        setTimeout(function () {
          if (confirm('Config tersimpan! Muat ulang halaman sekarang?')) location.reload();
        }, 1500);
      } catch (e) {
        toast('Gagal: ' + e.message, 'err');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Simpan ke GitHub'; }
      }
    }

    async function confirmUnscheduleAll() {
      var scheduled = getDrafts().filter(function (v) { return !!A.scheduled[v.id] });
      if (!scheduled.length) return;
      if (!confirm('Hapus jadwal untuk SEMUA ' + scheduled.length + ' video? Tindakan ini tidak bisa dibatalkan.')) return;
      var ok = 0;
      for (var i = 0; i < scheduled.length; i++) {
        try { await apiUnset(scheduled[i].id); delete A.scheduled[scheduled[i].id]; ok++; } catch (e) { }
      }
      saveSched(); toast(ok + ' jadwal berhasil dihapus', 'inf'); render();
    }
